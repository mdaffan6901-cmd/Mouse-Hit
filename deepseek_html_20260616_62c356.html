<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHACK · classic arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0c0f1e 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 1rem;
            margin: 0;
        }

        .game-container {
            max-width: 780px;
            width: 100%;
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(90, 140, 255, 0.15);
            border-radius: 3.5rem;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            padding: 2.2rem 2rem 2.5rem 2rem;
        }

        /* header panel — professional dark UI */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e1122;
            padding: 1rem 2rem;
            border-radius: 160px;
            margin-bottom: 2.5rem;
            border: 1px solid #2b3350;
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.5), 0 8px 12px rgba(0, 10, 30, 0.6);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            color: #b7cdff;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .stat-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 6px #3f6eff);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0ecff, #a3c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            text-shadow: 0 0 12px #2f4bff;
            min-width: 3rem;
            text-align: right;
        }

        .stat-label {
            font-size: 1rem;
            text-transform: uppercase;
            color: #7b8ec7;
            letter-spacing: 1px;
        }

        /* progress timer bar */
        .timer-section {
            margin-bottom: 2rem;
            padding: 0 0.3rem;
        }

        .timer-label {
            display: flex;
            justify-content: space-between;
            color: #99b3f0;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-track {
            height: 12px;
            background: #1a1e32;
            border-radius: 30px;
            border: 1px solid #2d3457;
            overflow: hidden;
            box-shadow: inset 0 2px 3px #0b0e1a;
        }

        .timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4f93ff, #a676ff, #ff6ec7);
            border-radius: 30px;
            transition: width 0.1s linear;
            box-shadow: 0 0 12px #658cff;
        }

        /* game grid — 3x3 high‑contrast holes */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem 1.8rem;
            margin: 2.2rem 0 2.5rem 0;
            justify-items: center;
            align-items: center;
        }

        .hole {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: radial-gradient(circle at 30% 30%, #2f385f, #0f1225 80%);
            border-radius: 50%;
            border: 3px solid #303b66;
            box-shadow: inset 0 10px 8px rgba(0, 0, 0, 0.8), 0 12px 15px rgba(0, 0, 0, 0.6), 0 0 0 2px #1f2542;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            cursor: pointer;
            position: relative;
        }

        .hole:active {
            transform: scale(0.96);
            border-color: #6b7ee0;
        }

        /* mole character — modern minimal */
        .mole {
            width: 85%;
            height: 85%;
            background: radial-gradient(circle at 35% 35%, #ffcf8a, #d46f2c 90%);
            border-radius: 45% 45% 40% 40%;
            box-shadow: 0 10px 0 #6f3f15, 0 14px 12px #00000066;
            border: 2px solid #ffb671;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-8%);
            transition: transform 0.12s cubic-bezier(0.42, 1.3, 0.8, 1.2);
            font-size: 2.2rem;
            font-weight: bold;
            color: #3a220e;
            text-shadow: 0 2px 0 #febf7a;
            animation: pop-up 0.15s ease-out;
        }

        /* mole emoji for charm */
        .mole::after {
            content: "🐭";
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.4));
            transform: rotate(5deg);
        }

        @keyframes pop-up {
            0% { transform: translateY(40%) scale(0.6); opacity: 0; }
            100% { transform: translateY(-8%) scale(1); opacity: 1; }
        }

        /* whacked effect (applied momentarily) */
        .hole.whacked .mole {
            background: radial-gradient(circle at 30% 30%, #ffa66b, #b84e1a);
            transform: scale(0.5) translateY(20%);
            opacity: 0.4;
            transition: 0.08s;
        }

        /* empty hole (no mole) */
        .hole.empty .mole {
            display: none;
        }

        /* CTA button — glowing primary */
        .action-button {
            background: #12172f;
            border: 2px solid #4264cc;
            color: #ccdbff;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 0.9rem 2rem;
            border-radius: 40px;
            min-width: 200px;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 8px 0 #0d1a42, 0 12px 24px #00000080;
            cursor: pointer;
            transition: 0.08s linear;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .action-button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0d1a42, 0 8px 18px #000;
        }

        .action-button:disabled {
            opacity: 0.45;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0d1a42;
            pointer-events: none;
            border-color: #5a5f7b;
        }

        .footer-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .highscore {
            background: #0d0f1f;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            border: 1px solid #3c4896;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fbffff;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .highscore span {
            color: #ffd966;
            font-size: 2rem;
            filter: drop-shadow(0 0 6px gold);
        }

        /* subtle hint */
        .credits {
            text-align: center;
            color: #39507e;
            margin-top: 1.6rem;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* responsiveness */
        @media (max-width: 500px) {
            .game-container { padding: 1.5rem 1rem; }
            .stats { padding: 0.7rem 1rem; }
            .stat-value { font-size: 1.8rem; }
            .grid { gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- top stat bar: score & strikes (misses) -->
    <div class="stats">
        <div class="stat-item">
            <span class="stat-icon">🎯</span>
            <span class="stat-value" id="scoreDisplay">0</span>
            <span class="stat-label">SCORE</span>
        </div>
        <div class="stat-item">
            <span class="stat-icon">⚡</span>
            <span class="stat-value" id="missDisplay">0</span>
            <span class="stat-label">MISS</span>
        </div>
    </div>

    <!-- timer bar with dynamic fill -->
    <div class="timer-section">
        <div class="timer-label">
            <span>⏳ ROUND</span>
            <span id="timerText">15s</span>
        </div>
        <div class="timer-track">
            <div class="timer-fill" id="timerFill" style="width: 100%;"></div>
        </div>
    </div>

    <!-- 3x3 whacking arena -->
    <div class="grid" id="gameGrid">
        <!-- 9 holes will be injected by JS -->
    </div>

    <!-- bottom panel: start / reset & highscore -->
    <div class="footer-panel">
        <button class="action-button" id="startBtn">
            <span>▶</span> START GAME
        </button>
        <div class="highscore">
            <span>🏆</span> <span id="highScoreDisplay">0</span>
        </div>
    </div>
    <div class="credits">WHACK · PRO EDITION // DARK UI</div>
</div>

<script>
    (function() {
        // ---------- GAME STATE ----------
        const BOARD_SIZE = 9;
        let score = 0;
        let misses = 0;           // number of missed moles (or empty clicks)
        let highScore = 0;
        let gameActive = false;
        let timerInterval = null;
        let moleInterval = null;
        let timeLeft = 15;         // seconds per round
        const MAX_TIME = 15;

        // store current mole index (null if no mole)
        let currentMoleIndex = null;

        // DOM elements
        const gridEl = document.getElementById('gameGrid');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const missDisplay = document.getElementById('missDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const startBtn = document.getElementById('startBtn');
        const timerFill = document.getElementById('timerFill');
        const timerText = document.getElementById('timerText');

        // highscore from localStorage (optional)
        try {
            const saved = localStorage.getItem('whackHighScore');
            if (saved) highScore = parseInt(saved, 10) || 0;
        } catch (e) { /* ignore */ }
        highScoreDisplay.innerText = highScore;

        // ---------- render 9 holes ----------
        function buildGrid() {
            gridEl.innerHTML = '';
            for (let i = 0; i < BOARD_SIZE; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole empty';   // start empty
                hole.dataset.index = i;

                const moleDiv = document.createElement('div');
                moleDiv.className = 'mole';
                // mole content via CSS pseudo-element (no extra text needed)
                hole.appendChild(moleDiv);

                // click handler
                hole.addEventListener('click', holeClickHandler);
                gridEl.appendChild(hole);
            }
        }

        // ----- click handler -----
        function holeClickHandler(e) {
            const hole = e.currentTarget;
            const index = parseInt(hole.dataset.index, 10);

            if (!gameActive) {
                // silent ignore – but we can give subtle feedback?
                return;
            }

            // if the clicked hole has a mole (and mole is visible)
            if (currentMoleIndex !== null && index === currentMoleIndex) {
                // WHACK success!
                score++;
                scoreDisplay.innerText = score;

                // animate whack (quick visual)
                hole.classList.add('whacked');
                setTimeout(() => {
                    hole.classList.remove('whacked');
                }, 120);

                // remove mole from board
                removeMoleFromHole(currentMoleIndex);
                currentMoleIndex = null;

                // immediately schedule a new mole (but don't overlap if game ended)
                if (gameActive) {
                    clearTimeout(moleInterval);  // cancel previous scheduled move
                    scheduleMole(250); // new mole after short delay
                }
            } else {
                // miss: either empty hole or wrong hole
                misses++;
                missDisplay.innerText = misses;

                // optional red flash feedback for miss
                hole.style.transition = 'background 0.1s';
                hole.style.background = 'radial-gradient(circle at 30% 30%, #802, #1f1225)';
                setTimeout(() => {
                    hole.style.background = '';
                }, 120);
            }
        }

        // helper: remove mole from board (if any) and update DOM
        function removeMoleFromHole(index) {
            if (index === null || index < 0) return;
            const prevHole = document.querySelector(`.hole[data-index="${index}"]`);
            if (prevHole) {
                prevHole.classList.add('empty');
            }
        }

        // place mole at given index (clears previous)
        function placeMoleAtIndex(newIndex) {
            // remove old mole
            if (currentMoleIndex !== null) {
                const oldHole = document.querySelector(`.hole[data-index="${currentMoleIndex}"]`);
                if (oldHole) oldHole.classList.add('empty');
            }

            // set new mole
            const newHole = document.querySelector(`.hole[data-index="${newIndex}"]`);
            if (newHole) {
                newHole.classList.remove('empty');
                currentMoleIndex = newIndex;
            } else {
                currentMoleIndex = null; // fallback
            }
        }

        // spawn new random mole, if game active and no mole present
        function spawnRandomMole() {
            if (!gameActive) return;

            // if mole exists already? remove it first (forced move)
            if (currentMoleIndex !== null) {
                removeMoleFromHole(currentMoleIndex);
                currentMoleIndex = null;
            }

            // pick random index
            const randomIdx = Math.floor(Math.random() * BOARD_SIZE);
            placeMoleAtIndex(randomIdx);
        }

        // schedule mole appearance (with delay)
        function scheduleMole(delay = 400) {
            if (moleInterval) {
                clearTimeout(moleInterval);
            }
            moleInterval = setTimeout(() => {
                if (gameActive) {
                    spawnRandomMole();
                    // also schedule next move if game still active (mole will auto move after 0.8~1.1 sec)
                    scheduleMole(800 + Math.random() * 400);
                }
            }, delay);
        }

        // ----- timer management -----
        function updateTimerDisplay() {
            const percent = (timeLeft / MAX_TIME) * 100;
            timerFill.style.width = `${percent}%`;
            timerText.innerText = `${timeLeft}s`;
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startTimer() {
            stopTimer(); // clear any previous
            timerInterval = setInterval(() => {
                if (!gameActive) {
                    // if game ended but timer still runs (safety)
                    stopTimer();
                    return;
                }

                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    // GAME OVER
                    gameActive = false;
                    stopTimer();
                    if (moleInterval) {
                        clearTimeout(moleInterval);
                        moleInterval = null;
                    }

                    // remove any visible mole
                    if (currentMoleIndex !== null) {
                        removeMoleFromHole(currentMoleIndex);
                        currentMoleIndex = null;
                    }

                    // update highscore
                    if (score > highScore) {
                        highScore = score;
                        highScoreDisplay.innerText = highScore;
                        try { localStorage.setItem('whackHighScore', highScore); } catch (e) {}
                    }

                    // disable start button? we enable start again
                    startBtn.disabled = false;
                }
            }, 1000);
        }

        // reset game (without autostart)
        function resetGame(keepHighScore = true) {
            gameActive = false;
            stopTimer();
            if (moleInterval) {
                clearTimeout(moleInterval);
                moleInterval = null;
            }

            // remove mole from board
            if (currentMoleIndex !== null) {
                removeMoleFromHole(currentMoleIndex);
                currentMoleIndex = null;
            }

            // reset stats
            score = 0;
            misses = 0;
            timeLeft = MAX_TIME;

            scoreDisplay.innerText = '0';
            missDisplay.innerText = '0';
            updateTimerDisplay();

            startBtn.disabled = false;
        }

        // start new round
        function startNewGame() {
            // reset but keep highscore
            resetGame(true);

            gameActive = true;
            timeLeft = MAX_TIME;
            updateTimerDisplay();

            // reset misses & score (already zero from reset)
            // ensure fresh
            score = 0; misses = 0;
            scoreDisplay.innerText = '0';
            missDisplay.innerText = '0';

            // remove any existing mole
            if (currentMoleIndex !== null) {
                removeMoleFromHole(currentMoleIndex);
                currentMoleIndex = null;
            }

            // start timer
            startTimer();

            // schedule first mole after 300ms
            scheduleMole(300);

            // disable start button while active
            startBtn.disabled = true;
        }

        // attach start button
        startBtn.addEventListener('click', () => {
            if (gameActive) {
                // if already active, do nothing (button disabled anyway)
                return;
            }
            startNewGame();
        });

        // optional: allow restart by clicking start during game? but button disabled, so fine.

        // build board on load
        buildGrid();

        // initial reset (to set empty holes)
        resetGame();

        // ensure highscore is shown
        highScoreDisplay.innerText = highScore;

        // update timer at start
        updateTimerDisplay();

        // extra: prevent double click / drag side effects
        document.querySelectorAll('.hole').forEach(h => {
            h.addEventListener('dragstart', (e) => e.preventDefault());
        });
    })();
</script>
</body>
</html>
