name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Capacitor Project
        run: |
          mkdir android-build
          cd android-build

          cat > package.json <<EOF
          {
            "name": "mouse-hit",
            "version": "1.0.0",
            "private": true
          }
          EOF

          npm install @capacitor/core@5.7.8 @capacitor/android@5.7.8 @capacitor/cli@5.7.8

          mkdir www

          cp ../index.html www/index.html

          cat > capacitor.config.json <<EOF
          {
            "appId": "com.mousehit.game",
            "appName": "Mouse Hit",
            "webDir": "www"
          }
          EOF

          npx cap add android

      - name: Generate Launcher Icons
        run: |
          cd android-build

          npm install --save-dev @capacitor/assets

          mkdir -p assets

          cp ../mouse_hit_icon.png assets/icon.png

          npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: |
          cd android-build
          npx cap sync android

      - name: Fix Kotlin Version
        run: |
          cd android-build/android

          cat >> build.gradle <<'EOF'

          configurations.all {
              resolutionStrategy.eachDependency { details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          cd android-build/android

          chmod +x gradlew

          ./gradlew clean

          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mouse-Hit-APK
          path: android-build/android/app/build/outputs/apk/debug/app-debug.apk
